<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Ballistics Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a2d; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; z-index: 100; text-shadow: 2px 2px 2px #000; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,40,60,0.5); border: 2px solid rgba(0,255,0,0.2); z-index: 200; backdrop-filter: blur(8px); }
        .knob { position: absolute; width: 40px; height: 40px; background: #00ff00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ff00; opacity: 0.7; }
        #stick-move { bottom: 30px; left: 30px; width: 110px; height: 110px; }
        #stick-aim { bottom: 30px; right: 30px; width: 110px; height: 110px; }
        #fire-btn { 
            position: absolute; bottom: 160px; left: 45px; width: 75px; height: 75px; 
            border-radius: 50%; background: radial-gradient(#ff5555, #990000); border: 3px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px; font-weight: 900; letter-spacing: 2px;">BB-67 USS MONTANA</div>
        <hr style="border: 0; border-top: 1px solid #00ff00; margin: 5px 0;">
        <div id="speed">VELOCITY: 0 KTS</div>
        <div id="score">HOSTILES SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x448aff);
        scene.fog = new THREE.Fog(0x448aff, 200, 15000); 
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 60000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 3.2);
        sun.position.set(1000, 2000, 1000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 1.0));

        // --- SHIP BLUEPRINTS ---
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x546e7a, metalness: 0.7, roughness: 0.4 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 1.0 });
        const metalBlack = new THREE.MeshStandardMaterial({ color: 0x212121, metalness: 0.9 });

        class ShipFactory {
            static createPlayerShip() {
                const group = new THREE.Group();
                const hull = new THREE.Mesh(new THREE.BoxGeometry(34, 14, 320), steelMat);
                hull.position.y = 5; group.add(hull);

                const deck = new THREE.Mesh(new THREE.BoxGeometry(32, 1.2, 314), woodMat);
                deck.position.y = 12.1; group.add(deck);

                const bridgeLower = new THREE.Mesh(new THREE.BoxGeometry(14, 12, 50), steelMat);
                bridgeLower.position.set(0, 18, 0); group.add(bridgeLower);

                const bridgeUpper = new THREE.Mesh(new THREE.BoxGeometry(16, 8, 20), steelMat);
                bridgeUpper.position.set(0, 26, 15); group.add(bridgeUpper);

                for (let z of [-20, -60]) {
                    const f = new THREE.Mesh(new THREE.CylinderGeometry(5, 5.5, 25, 12), metalBlack);
                    f.position.set(0, 24, z); group.add(f);
                }

                for (let side of [-1, 1]) {
                    for (let z of [-90, -45, 0, 45, 90]) {
                        const sec = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 8), steelMat);
                        sec.position.set(side * 15, 14, z); group.add(sec);
                    }
                }

                for (let side of [-1, 1]) {
                    for (let z of [-110, -125]) {
                        const boat = new THREE.Mesh(new THREE.CapsuleGeometry(2.5, 8, 4, 8), new THREE.MeshStandardMaterial({color: 0xf5f5f5}));
                        boat.rotation.x = Math.PI/2; boat.position.set(side * 12, 13.5, z); group.add(boat);
                    }
                }
                return group;
            }

            static createEnemyCruiser() {
                const group = new THREE.Group();
                const enemyMat = new THREE.MeshStandardMaterial({ color: 0x37474f, metalness: 0.5 });
                const h = new THREE.Mesh(new THREE.ConeGeometry(15, 130, 4), enemyMat);
                h.rotation.x = Math.PI/2; h.position.y = 4; group.add(h);
                const tower = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 30), enemyMat);
                tower.position.set(0, 12, 5); group.add(tower);
                return group;
            }
        }

        // --- GAME OBJECTS ---
        const player = ShipFactory.createPlayerShip();
        scene.add(player);

        // UPDATED TURRETS: Support for Y-axis elevation
        const turrets = [-125, -85, 75, 115].map(z => {
            const tGroup = new THREE.Group(); tGroup.position.set(0, 12.7, z);
            const base = new THREE.Mesh(new THREE.BoxGeometry(18, 6, 24), steelMat);
            tGroup.add(base);

            // Pivot for elevation
            const elevationPivot = new THREE.Group();
            elevationPivot.position.set(0, 2, 0); 
            
            const barrels = [-5, 0, 5].map(x => {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.1, 45), metalBlack);
                b.rotation.x = Math.PI/2;
                b.position.set(x, 0, 20); // Relative to elevationPivot
                elevationPivot.add(b);
                return b;
            });

            tGroup.add(elevationPivot);
            player.add(tGroup);
            return { group: tGroup, pivot: elevationPivot, barrels: barrels };
        });

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(100000, 100000), new THREE.MeshStandardMaterial({color: 0x01579b, roughness: 0.2}));
        ocean.rotation.x = -Math.PI/2; scene.add(ocean);

        const islands = Array(15).fill(0).map(() => {
            const r = 400 + Math.random()*1000;
            const isl = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 6), new THREE.MeshStandardMaterial({color: 0x1b5e20}));
            isl.scale.y = 0.08; isl.position.set((Math.random()-0.5)*40000, -20, (Math.random()-0.5)*40000);
            scene.add(isl);
            return { pos: isl.position, r: r * 0.85 };
        });

        const enemies = [];
        for(let i=0; i<12; i++) {
            const e = ShipFactory.createEnemyCruiser();
            const ang = Math.random()*Math.PI*2, dist = 6000 + Math.random()*6000;
            e.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(e);
            enemies.push({ mesh: e, sinking: false, hp: 4 });
        }

        // --- FX SYSTEM ---
        const projectiles = [], particles = [];
        function explosion(pos, col, count, size) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color: col, transparent: true}));
                p.position.copy(pos);
                const v = new THREE.Vector3((Math.random()-0.5)*20, Math.random()*15, (Math.random()-0.5)*20);
                scene.add(p);
                particles.push({m:p, v, life:1.0, d:0.02});
            }
        }

        // --- CONTROLS ---
        let mv = {x:0, y:0}, am = {x:0, y:0}, speed = 0, score = 0;
        const bind = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const fn = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', fn);
            el.addEventListener('pointermove', e => e.buttons && fn(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bind('stick-move', mv); bind('stick-aim', am);
        
        document.getElementById('fire-btn').addEventListener('pointerdown', () => {
            turrets.forEach(t => {
                t.barrels.forEach(b => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color: 0xffea00}));
                    const worldPos = new THREE.Vector3();
                    b.getWorldPosition(worldPos);
                    
                    // Direction based on both turret rotation and barrel elevation
                    const worldQuat = new THREE.Quaternion();
                    b.getWorldQuaternion(worldQuat);
                    const direction = new THREE.Vector3(0, 1, 0).applyQuaternion(worldQuat); // Cylinder up is Y
                    
                    shell.position.copy(worldPos);
                    projectiles.push({
                        m: shell, 
                        v: direction.multiplyScalar(40), // Increased velocity
                        g: 0.04, // Gravity
                        life: 300 // Frames before auto-cleanup if it flies too far
                    });
                    scene.add(shell);
                    explosion(worldPos, 0xffaa00, 2, 2);
                });
            });
        });

        // --- MAIN LOOP ---
        function update() {
            requestAnimationFrame(update);
            
            const prev = player.position.clone();
            speed = THREE.MathUtils.lerp(speed, -mv.y * 2.0, 0.002);
            player.rotation.y -= mv.x * 0.002 * (Math.abs(speed/2.0) + 0.2);
            player.translateZ(speed);

            islands.forEach(isl => {
                if(player.position.distanceTo(isl.pos) < isl.r + 60) {
                    player.position.copy(prev); speed *= -0.4;
                }
            });

            // UPDATED SHELL BEHAVIOR
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.m.position.add(p.v);
                p.v.y -= p.g; // Apply gravity
                p.life--;

                if(p.m.position.y < 0 || p.life <= 0) {
                    explosion(p.m.position, 0xffffff, 6, 2.5);
                    scene.remove(p.m);
                    projectiles.splice(i, 1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.m.position.distanceTo(en.mesh.position) < 85) {
                            en.hp--; explosion(p.m.position, 0xff4500, 12, 6);
                            scene.remove(p.m); projectiles.splice(i,1);
                            if(en.hp <= 0) { 
                                en.sinking = true; score++; 
                                explosion(en.mesh.position, 0xff0000, 60, 20);
                                document.getElementById('score').innerText = `HOSTILES SUNK: ${score}`; 
                            }
                        }
                    });
                }
            }

            particles.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d;
                p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
            });

            // UPDATED GUN BEHAVIOR (Elevation & Rotation)
            turrets.forEach(t => {
                // Rotation (Left/Right)
                t.group.rotation.y = THREE.MathUtils.lerp(t.group.rotation.y, -am.x * Math.PI, 0.08);
                // Elevation (Up/Down) - Aiming stick Y axis controls this
                const targetElevation = am.y * 0.6; // Max 0.6 rad (~35 degrees)
                t.pivot.rotation.x = THREE.MathUtils.lerp(t.pivot.rotation.x, targetElevation, 0.08);
            });

            const camTarget = new THREE.Vector3(0, 45, -550).applyMatrix4(player.matrixWorld);
            camera.position.lerp(camTarget, 0.05);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 30, 200)));

            enemies.forEach(en => { if(en.sinking) { en.mesh.position.y -= 0.15; en.mesh.rotation.z += 0.005; } });
            
            document.getElementById('speed').innerText = `VELOCITY: ${Math.abs(Math.floor((speed / 2.0) * 35))} KTS`;
            renderer.render(scene, camera);
        }

        update();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
