<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Close-In Combat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a2d; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; z-index: 100; text-shadow: 2px 2px 2px #000; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,40,60,0.5); border: 2px solid rgba(0,255,0,0.2); z-index: 200; backdrop-filter: blur(8px); }
        .knob { position: absolute; width: 40px; height: 40px; background: #00ff00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ff00; opacity: 0.7; }
        #stick-move { bottom: 30px; left: 30px; width: 110px; height: 110px; }
        #stick-aim { bottom: 30px; right: 30px; width: 110px; height: 110px; }
        #fire-btn { 
            position: absolute; bottom: 160px; left: 45px; width: 75px; height: 75px; 
            border-radius: 50%; background: radial-gradient(#ff5555, #990000); border: 3px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px; font-weight: 900; letter-spacing: 2px;">BB-67 USS MONTANA</div>
        <hr style="border: 0; border-top: 1px solid #00ff00; margin: 5px 0;">
        <div id="speed">VELOCITY: 0 KTS</div>
        <div id="score">HOSTILES SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE & ULTRA-WIDE CAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x448aff);
        scene.fog = new THREE.Fog(0x448aff, 200, 20000); 
        
        // FOV: 100 as requested
        const camera = new THREE.PerspectiveCamera(100, window.innerWidth / window.innerHeight, 1, 80000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 3.5);
        sun.position.set(2000, 3000, 1000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 1.2));

        // --- MATERIALS ---
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x546e7a, metalness: 0.8, roughness: 0.3 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.9 });
        const metalBlack = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

        class ShipFactory {
            static createPlayer() {
                const group = new THREE.Group();
                const hull = new THREE.Mesh(new THREE.BoxGeometry(34, 16, 330), steelMat);
                hull.position.y = 6; group.add(hull);

                const deck = new THREE.Mesh(new THREE.BoxGeometry(32, 1.5, 324), woodMat);
                deck.position.y = 14.1; group.add(deck);

                const lowerBridge = new THREE.Mesh(new THREE.BoxGeometry(16, 14, 60), steelMat);
                lowerBridge.position.set(0, 20, 0); group.add(lowerBridge);

                const midBridge = new THREE.Mesh(new THREE.BoxGeometry(14, 10, 35), steelMat);
                midBridge.position.set(0, 32, 10); group.add(midBridge);

                const commandDeck = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 15), metalBlack);
                commandDeck.position.set(0, 40, 18); group.add(commandDeck);

                const funnelPositions = [-25, -65];
                funnelPositions.forEach(zPos => {
                    const funnel = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 6, 30, 16), metalBlack);
                    funnel.position.set(0, 28, zPos); group.add(funnel);
                    const cap = new THREE.Mesh(new THREE.TorusGeometry(5.5, 0.5, 8, 16), steelMat);
                    cap.rotation.x = Math.PI/2; cap.position.set(0, 43, zPos); group.add(cap);
                });

                const sidePositions = [-100, -60, -20, 20, 60, 100];
                for (let side of [-1, 1]) {
                    sidePositions.forEach(z => {
                        const battery = new THREE.Mesh(new THREE.BoxGeometry(6, 5, 9), steelMat);
                        battery.position.set(side * 16, 16, z); group.add(battery);
                        const sBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10), metalBlack);
                        sBarrel.rotation.x = Math.PI/2; sBarrel.position.set(side * 16, 16, z + 6); group.add(sBarrel);
                    });
                }

                const boatPositions = [-115, -130, -145];
                for (let side of [-1, 1]) {
                    boatPositions.forEach(z => {
                        const boat = new THREE.Mesh(new THREE.CapsuleGeometry(2.8, 8, 4, 8), whiteMat);
                        boat.rotation.x = Math.PI/2; boat.position.set(side * 13, 15, z); group.add(boat);
                    });
                }
                return group;
            }

            static createEnemy() {
                const group = new THREE.Group();
                const enemyMat = new THREE.MeshStandardMaterial({ color: 0x263238 });
                const hull = new THREE.Mesh(new THREE.ConeGeometry(16, 140, 4), enemyMat);
                hull.rotation.x = Math.PI/2; hull.position.y = 5; group.add(hull);
                const bridge = new THREE.Mesh(new THREE.BoxGeometry(12, 18, 30), enemyMat);
                bridge.position.set(0, 14, 10); group.add(bridge);
                return group;
            }
        }

        const player = ShipFactory.createPlayer();
        scene.add(player);

        const turrets = [-130, -90, 85, 125].map(z => {
            const tBase = new THREE.Group(); tBase.position.set(0, 15, z);
            const armor = new THREE.Mesh(new THREE.BoxGeometry(20, 8, 26), steelMat);
            tBase.add(armor);
            const elevPivot = new THREE.Group(); elevPivot.position.set(0, 2, 0); 
            const barrels = [-6, 0, 6].map(x => {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.3, 50), metalBlack);
                b.rotation.x = Math.PI/2; b.position.set(x, 1, 22); elevPivot.add(b); return b;
            });
            tBase.add(elevPivot); player.add(tBase);
            return { group: tBase, pivot: elevPivot, barrels: barrels };
        });

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(120000, 120000), new THREE.MeshStandardMaterial({color: 0x004d40, roughness: 0.1}));
        ocean.rotation.x = -Math.PI/2; scene.add(ocean);

        const islands = Array(20).fill(0).map(() => {
            const r = 500 + Math.random()*1200;
            const isl = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 8), new THREE.MeshStandardMaterial({color: 0x1b5e20}));
            isl.scale.y = 0.05; isl.position.set((Math.random()-0.5)*50000, -30, (Math.random()-0.5)*50000);
            scene.add(isl); return { pos: isl.position, r: r * 0.9 };
        });

        const enemies = [];
        for(let i=0; i<15; i++) {
            const e = ShipFactory.createEnemy();
            const ang = Math.random()*Math.PI*2, dist = 7000 + Math.random()*8000;
            e.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(e); enemies.push({ mesh: e, sinking: false, hp: 5 });
        }

        let mv = {x:0, y:0}, am = {x:0, y:0}, speed = 0, score = 0;
        const shells = [], fx = [];

        function spawnFX(pos, color, count, size) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color: color, transparent: true}));
                p.position.copy(pos);
                const v = new THREE.Vector3((Math.random()-0.5)*25, Math.random()*20, (Math.random()-0.5)*25);
                scene.add(p); fx.push({m:p, v, life:1.0, d:0.015});
            }
        }

        const bindControl = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const handler = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', handler);
            el.addEventListener('pointermove', e => e.buttons && handler(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bindControl('stick-move', mv); bindControl('stick-aim', am);

        document.getElementById('fire-btn').addEventListener('pointerdown', () => {
            turrets.forEach(t => {
                t.barrels.forEach(b => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(3.5), new THREE.MeshBasicMaterial({color: 0xffeb3b}));
                    const wPos = new THREE.Vector3(); b.getWorldPosition(wPos);
                    const wQuat = new THREE.Quaternion(); b.getWorldQuaternion(wQuat);
                    const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(wQuat);
                    shell.position.copy(wPos);
                    shells.push({ m: shell, v: dir.multiplyScalar(50), g: 0.035, life: 500 });
                    scene.add(shell); spawnFX(wPos, 0xff9800, 3, 2);
                });
            });
        });

        function frame() {
            requestAnimationFrame(frame);
            const oldPos = player.position.clone();
            speed = THREE.MathUtils.lerp(speed, -mv.y * 2.5, 0.003);
            player.rotation.y -= mv.x * 0.0025 * (Math.abs(speed/2.5) + 0.1);
            player.translateZ(speed);

            islands.forEach(isl => {
                if(player.position.distanceTo(isl.pos) < isl.r + 70) {
                    player.position.copy(oldPos); speed *= -0.3;
                }
            });

            for (let i = shells.length - 1; i >= 0; i--) {
                const s = shells[i]; s.m.position.add(s.v); s.v.y -= s.g; s.life--;
                if(s.m.position.y < 0 || s.life <= 0) {
                    spawnFX(s.m.position, 0xffffff, 8, 3);
                    scene.remove(s.m); shells.splice(i, 1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && s.m.position.distanceTo(en.mesh.position) < 90) {
                            en.hp--; spawnFX(s.m.position, 0xff1744, 15, 6);
                            scene.remove(s.m); shells.splice(i, 1);
                            if(en.hp <= 0) { 
                                en.sinking = true; score++; spawnFX(en.mesh.position, 0xff5722, 80, 25);
                                document.getElementById('score').innerText = `HOSTILES SUNK: ${score}`; 
                            }
                        }
                    });
                }
            }

            fx.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d; p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); fx.splice(i, 1); }
            });

            turrets.forEach(t => {
                t.group.rotation.y = THREE.MathUtils.lerp(t.group.rotation.y, -am.x * Math.PI, 0.1);
                t.pivot.rotation.x = THREE.MathUtils.lerp(t.pivot.rotation.x, am.y * 0.7, 0.1);
            });

            // CAMERA UPDATED: Closer to player (Z from -560 to -400) and lower (Y from 50 to 35)
            const camPos = new THREE.Vector3(0, 35, -400).applyMatrix4(player.matrixWorld);
            camera.position.lerp(camPos, 0.1); // Increased lerp for snappier response
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 20, 200)));

            enemies.forEach(en => { if(en.sinking) { en.mesh.position.y -= 0.2; en.mesh.rotation.z += 0.006; } });
            document.getElementById('speed').innerText = `VELOCITY: ${Math.abs(Math.floor((speed / 2.5) * 38))} KTS`;
            renderer.render(scene, camera);
        }

        frame();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
