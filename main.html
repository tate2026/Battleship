<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Stabilized Command</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; z-index: 100; text-shadow: 2px 2px 2px #000; }
        #radar { 
            position: absolute; top: 20px; right: 20px; width: 140px; height: 140px; 
            background: rgba(0, 40, 0, 0.6); border: 2px solid #00ff00; border-radius: 50%;
            overflow: hidden; pointer-events: none;
        }
        #radar-sweep {
            position: absolute; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 0, 0.3));
            animation: sweep 3s linear infinite;
        }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .radar-blip { position: absolute; width: 6px; height: 6px; background: #ff0000; border-radius: 50%; transform: translate(-50%, -50%); }
        #player-blip { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #00ffff; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform: translate(-50%, -50%); }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,40,60,0.5); border: 2px solid rgba(0,255,0,0.2); z-index: 200; backdrop-filter: blur(8px); }
        .knob { position: absolute; width: 40px; height: 40px; background: #00ff00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ff00; }
        #stick-move { bottom: 30px; left: 30px; width: 110px; height: 110px; }
        #stick-aim { bottom: 30px; right: 30px; width: 110px; height: 110px; }
        #fire-btn { 
            position: absolute; bottom: 160px; left: 45px; width: 80px; height: 80px; 
            border-radius: 50%; background: radial-gradient(#ff5555, #990000); border: 3px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 22px; font-weight: 900;">BB-67 USS MONTANA</div>
        <div id="speed">VELOCITY: 0 KTS</div>
        <div id="score">HOSTILES SUNK: 0</div>
    </div>

    <div id="radar">
        <div id="radar-sweep"></div>
        <div id="player-blip"></div>
        <div id="blip-container"></div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CORE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x64b5f6); 
        scene.fog = new THREE.Fog(0x64b5f6, 1000, 30000); 
        const camera = new THREE.PerspectiveCamera(120, window.innerWidth / window.innerHeight, 1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 3.5);
        sun.position.set(3000, 5000, 2000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 1.0));

        const matSteel = new THREE.MeshStandardMaterial({ color: 0x546e7a, metalness: 0.8 });
        const matDeck = new THREE.MeshStandardMaterial({ color: 0x8d6e63 });
        const matGun = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.95 });

        // --- PLAYER SHIP ---
        const player = new THREE.Group();
        const hull = new THREE.Mesh(new THREE.BoxGeometry(36, 18, 340), matSteel);
        hull.position.y = 8; player.add(hull);
        const deck = new THREE.Mesh(new THREE.BoxGeometry(34, 1.5, 334), matDeck);
        deck.position.y = 17.5; player.add(deck);
        scene.add(player);

        const mainTurrets = [-135, -95, 90, 130].map(z => {
            const base = new THREE.Group(); base.position.set(0, 18.2, z);
            const box = new THREE.Mesh(new THREE.BoxGeometry(22, 10, 28), matSteel); base.add(box);
            const pivot = new THREE.Group(); pivot.position.set(0, 2, 0); 
            const guns = [-7, 0, 7].map(x => {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.5, 55), matGun);
                b.rotation.x = Math.PI/2; b.position.set(x, 1, 25); pivot.add(b); return b;
            });
            base.add(pivot); player.add(base);
            return { group: base, pivot, barrels: guns };
        });

        // --- ENVIRONMENT ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(200000, 200000), new THREE.MeshStandardMaterial({ color: 0x01579b }));
        ocean.rotation.x = -Math.PI/2; scene.add(ocean);

        const enemies = [];
        const blipContainer = document.getElementById('blip-container');
        for(let i=0; i<15; i++) {
            const eGroup = new THREE.Group();
            const eHull = new THREE.Mesh(new THREE.BoxGeometry(40, 25, 140), new THREE.MeshStandardMaterial({color: 0x222222}));
            eHull.position.y = 12; eGroup.add(eHull);
            const marker = new THREE.Mesh(new THREE.SphereGeometry(20, 8, 8), new THREE.MeshBasicMaterial({color: 0xff0000, wireframe: true}));
            marker.position.y = 150; eGroup.add(marker);
            const ang = Math.random() * Math.PI * 2, dist = 6000 + Math.random() * 9000;
            eGroup.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(eGroup);
            const blip = document.createElement('div'); blip.className = 'radar-blip';
            blipContainer.appendChild(blip);
            enemies.push({ mesh: eGroup, sinking: false, hp: 5, blip: blip });
        }

        // --- LOGIC ---
        let mv = {x:0, y:0}, am = {x:0, y:0}, speed = 0, score = 0;
        const shells = [];

        function setupStick(id, obj) {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const handle = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1, Math.min(1, obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1, Math.min(1, obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', handle);
            el.addEventListener('pointermove', e => e.buttons && handle(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        }
        setupStick('stick-move', mv); setupStick('stick-aim', am);

        document.getElementById('fire-btn').addEventListener('pointerdown', () => {
            mainTurrets.forEach(t => t.barrels.forEach(b => {
                const s = new THREE.Mesh(new THREE.SphereGeometry(4), new THREE.MeshBasicMaterial({color: 0xffff00}));
                const pos = new THREE.Vector3(), quat = new THREE.Quaternion();
                b.getWorldPosition(pos); b.getWorldQuaternion(quat);
                s.position.copy(pos);
                shells.push({ m: s, v: new THREE.Vector3(0,1,0).applyQuaternion(quat).multiplyScalar(70), g: 0.04 });
                scene.add(s);
            }));
        });

        function frame() {
            requestAnimationFrame(frame);
            speed = THREE.MathUtils.lerp(speed, -mv.y * 3.2, 0.01);
            player.rotation.y -= mv.x * 0.005;
            player.translateZ(speed);

            // Radar
            document.getElementById('player-blip').style.transform = `translate(-50%, -50%) rotate(${-player.rotation.y}rad)`;
            enemies.forEach(e => {
                if(e.sinking) { e.mesh.position.y -= 0.5; e.blip.style.display='none'; return; }
                const dx = e.mesh.position.x - player.position.x, dz = e.mesh.position.z - player.position.z;
                if(Math.sqrt(dx*dx + dz*dz) < 15000) {
                    e.blip.style.display = 'block';
                    e.blip.style.left = (50 + (dx / 15000) * 50) + '%';
                    e.blip.style.top = (50 - (dz / 15000) * 50) + '%';
                } else e.blip.style.display = 'none';
            });

            // Shells
            for(let i=shells.length-1; i>=0; i--) {
                const s = shells[i]; s.m.position.add(s.v); s.v.y -= s.g;
                if(s.m.position.y < 0) { scene.remove(s.m); shells.splice(i,1); }
                else enemies.forEach(en => {
                    if(!en.sinking && s.m.position.distanceTo(en.mesh.position) < 120) {
                        en.hp--; scene.remove(s.m); shells.splice(i,1);
                        if(en.hp <= 0) { en.sinking=true; score++; document.getElementById('score').innerText = `HOSTILES SUNK: ${score}`; }
                    }
                });
            }

            mainTurrets.forEach(t => {
                t.group.rotation.y = THREE.MathUtils.lerp(t.group.rotation.y, -am.x * Math.PI, 0.1);
                t.pivot.rotation.x = THREE.MathUtils.lerp(t.pivot.rotation.x, am.y * 0.7, 0.1);
            });

            // FIXED CAMERA LOGIC: We calculate the offset relative to the ship EVERY frame
            // This prevents the ship from sliding to the side of the screen during turns.
            const cameraRelativeOffset = new THREE.Vector3(0, 50, -250); 
            const cameraWorldPosition = cameraRelativeOffset.applyMatrix4(player.matrixWorld);
            
            // Using a higher lerp factor (0.2) or direct assignment makes the ship stay centered
            camera.position.lerp(cameraWorldPosition, 0.2); 
            
            // The lookAt target also follows the ship's orientation perfectly
            const lookAtTarget = new THREE.Vector3(0, 20, 400).applyMatrix4(player.matrixWorld);
            camera.lookAt(lookAtTarget);

            renderer.render(scene, camera);
        }
        frame();
    </script>
</body>
</html>
