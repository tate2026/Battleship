<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Sea-Level Detail</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a2d; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; z-index: 100; text-shadow: 2px 2px 2px #000; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,40,60,0.5); border: 2px solid rgba(0,255,0,0.2); z-index: 200; backdrop-filter: blur(8px); }
        .knob { position: absolute; width: 40px; height: 40px; background: #00ff00; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ff00; opacity: 0.7; }
        #stick-move { bottom: 30px; left: 30px; width: 110px; height: 110px; }
        #stick-aim { bottom: 30px; right: 30px; width: 110px; height: 110px; }
        #fire-btn { 
            position: absolute; bottom: 160px; left: 45px; width: 75px; height: 75px; 
            border-radius: 50%; background: radial-gradient(#ff5555, #990000); border: 3px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px; font-weight: 900; letter-spacing: 2px;">BB-67 MONTANA CLASS</div>
        <hr style="border: 0; border-top: 1px solid #00ff00; margin: 5px 0;">
        <div id="speed">VELOCITY: 0 KTS</div>
        <div id="score">HOSTILES SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3e90ff);
        scene.fog = new THREE.Fog(0x3e90ff, 100, 18000); 
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 60000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 3.0);
        sun.position.set(1000, 1500, 1000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 1.2));

        // --- MATERIALS ---
        const steel = new THREE.MeshStandardMaterial({ color: 0x546e7a, metalness: 0.8, roughness: 0.3 });
        const wood = new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.9 });
        const black = new THREE.MeshStandardMaterial({ color: 0x111111 });

        // --- SHIP FACTORY ---
        class ShipFactory {
            static createPlayer() {
                const group = new THREE.Group();
                
                // Detailed Hull
                const hull = new THREE.Mesh(new THREE.BoxGeometry(32, 12, 320), steel);
                hull.position.y = 5; group.add(hull);

                const deck = new THREE.Mesh(new THREE.BoxGeometry(30, 1, 310), wood);
                deck.position.y = 11.1; group.add(deck);

                // Multi-Tier Bridge Complex
                const bridgeBase = new THREE.Mesh(new THREE.BoxGeometry(12, 14, 45), steel);
                bridgeBase.position.set(0, 18, 5); group.add(bridgeBase);

                const upperBridge = new THREE.Mesh(new THREE.BoxGeometry(14, 8, 20), steel);
                upperBridge.position.set(0, 26, 12); group.add(upperBridge);

                // Funnels
                [-25, -55].forEach(z => {
                    const f = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 22), black);
                    f.position.set(0, 22, z); group.add(f);
                });

                // Secondary Side Batteries
                for(let side of [-1, 1]) {
                    for(let z of [-80, -40, 0, 40, 80]) {
                        const sec = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 7), steel);
                        sec.position.set(side * 14, 13, z);
                        group.add(sec);
                    }
                }

                // Lifeboats
                for(let side of [-1, 1]) {
                    for(let z of [-100, -115]) {
                        const boat = new THREE.Mesh(new THREE.CapsuleGeometry(2.5, 8, 4, 8), new THREE.MeshStandardMaterial({color:0xffffff}));
                        boat.rotation.x = Math.PI/2;
                        boat.position.set(side * 12, 12, z);
                        group.add(boat);
                    }
                }

                return group;
            }

            static createEnemy() {
                const group = new THREE.Group();
                const camo = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
                
                // Aggressive Cruiser Hull
                const h = new THREE.Mesh(new THREE.ConeGeometry(18, 140, 4), camo);
                h.rotation.x = Math.PI/2; h.position.y = 5; group.add(h);

                const tower = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 25), camo);
                tower.position.set(0, 12, 10); group.add(tower);

                // Enemy turrets
                [35, -35].forEach(z => {
                    const t = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 10), camo);
                    t.position.set(0, 11, z);
                    const b = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 20), black);
                    b.rotation.x = Math.PI/2; b.position.z = 10; t.add(b);
                    group.add(t);
                });
                return group;
            }
        }

        // --- WORLD ELEMENTS ---
        const player = ShipFactory.createPlayer();
        scene.add(player);

        const turrets = [-125, -90, 85, 120].map(z => {
            const t = new THREE.Group(); t.position.set(0, 11.5, z);
            const base = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 22), steel);
            t.add(base);
            const pivot = new THREE.Group();
            const barrels = [-4.5, 0, 4.5].map(x => {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.9, 40), black);
                b.rotation.x = Math.PI/2; b.position.set(x, 1, 18); pivot.add(b); return b;
            });
            t.add(pivot); player.add(t);
            return { group: t, pivot };
        });

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(150000, 150000), new THREE.MeshStandardMaterial({color: 0x01579b, roughness: 0.1, metalness: 0.4}));
        ocean.rotation.x = -Math.PI/2; scene.add(ocean);

        const islands = Array(20).fill(0).map(() => {
            const r = 500 + Math.random()*800;
            const isl = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 6), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            isl.scale.y = 0.1;
            isl.position.set((Math.random()-0.5)*40000, -30, (Math.random()-0.5)*40000);
            scene.add(isl);
            return { pos: isl.position, r: r * 0.85 };
        });

        const enemies = [];
        const spawn = () => {
            const e = ShipFactory.createEnemy();
            const ang = Math.random()*Math.PI*2, dist = 5000 + Math.random()*5000;
            e.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(e);
            enemies.push({ mesh: e, sinking: false, hp: 4 });
        };
        for(let i=0; i<12; i++) spawn();

        // --- SYSTEMS ---
        const projectiles = [], particles = [];
        let mv = {x:0, y:0}, am = {x:0, y:0}, speed = 0, score = 0;

        function explosion(pos, col, count, size) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color: col, transparent: true}));
                p.position.copy(pos);
                const v = new THREE.Vector3((Math.random()-0.5)*18, Math.random()*12, (Math.random()-0.5)*18);
                scene.add(p);
                particles.push({m:p, v, life:1.0, d:0.02});
            }
        }

        const bind = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const fn = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', fn);
            el.addEventListener('pointermove', e => e.buttons && fn(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bind('stick-move', mv); bind('stick-aim', am);
        
        document.getElementById('fire-btn').addEventListener('pointerdown', () => {
            turrets.forEach(t => {
                const shell = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color: 0xffea00}));
                const p = new THREE.Vector3(); t.group.getWorldPosition(p);
                const d = new THREE.Vector3(0,1,0).applyQuaternion(t.group.getWorldQuaternion(new THREE.Quaternion()));
                shell.position.copy(p);
                projectiles.push({m:shell, v:d.multiplyScalar(32), g:0.03});
                scene.add(shell);
                explosion(p, 0xffaa00, 2, 2);
            });
        });

        // --- MAIN LOOP ---
        function update() {
            requestAnimationFrame(update);
            
            const prev = player.position.clone();
            speed = THREE.MathUtils.lerp(speed, -mv.y * 1.8, 0.0018);
            player.rotation.y -= mv.x * 0.0018 * (Math.abs(speed/1.8) + 0.2);
            player.translateZ(speed);

            islands.forEach(isl => {
                if(player.position.distanceTo(isl.pos) < isl.r + 50) {
                    player.position.copy(prev); speed *= -0.5;
                }
            });

            projectiles.forEach((p, i) => {
                p.m.position.add(p.v); p.v.y -= p.g;
                if(p.m.position.y < 0) {
                    explosion(p.m.position, 0xffffff, 5, 2);
                    scene.remove(p.m); projectiles.splice(i,1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.m.position.distanceTo(en.mesh.position) < 80) {
                            en.hp--; explosion(p.m.position, 0xff3300, 10, 5);
                            scene.remove(p.m); projectiles.splice(i,1);
                            if(en.hp <= 0) { en.sinking = true; score++; explosion(en.mesh.position, 0xff0000, 50, 15); document.getElementById('score').innerText = `HOSTILES SUNK: ${score}`; }
                        }
                    });
                }
            });

            particles.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d;
                p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
            });

            turrets.forEach(t => {
                t.group.rotation.y = THREE.MathUtils.lerp(t.group.rotation.y, -am.x * Math.PI, 0.07);
            });

            // CAMERA: Close & Low
            const camTarget = new THREE.Vector3(0, 50, -580).applyMatrix4(player.matrixWorld);
            camera.position.lerp(camTarget, 0.04);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 30, 200)));

            enemies.forEach(en => { if(en.sinking) { en.mesh.position.y -= 0.15; en.mesh.rotation.z += 0.004; } });
            
            document.getElementById('speed').innerText = `VELOCITY: ${Math.abs(Math.floor((speed / 1.8) * 33))} KTS`;
            renderer.render(scene, camera);
        }

        update();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
