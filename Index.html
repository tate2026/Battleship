<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Montana Strike: Dual Stick</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 100; }
        
        .ctrl-base { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); z-index: 200; }
        .knob { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); top: 50%; left: 50%; }
        
        /* Left Stick: Ship Movement */
        #stick-move { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        
        /* Right Stick: Turret Control */
        #stick-aim { bottom: 40px; right: 40px; width: 120px; height: 120px; }
        
        /* Fire Button: Above Aim Stick */
        #fire-btn { 
            position: absolute; bottom: 180px; right: 50px; width: 100px; height: 100px; 
            border-radius: 50%; background: rgba(255,0,0,0.7); border: 3px solid white;
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 20px; font-weight: bold;">USS MONTANA (BB-67)</div>
        <div id="speed">0 KNOTS</div>
        <div id="score">Targets Sunk: 0</div>
    </div>
    
    <div id="stick-move" class="ctrl-base"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="ctrl-base"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 100, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

        // --- SHIP ---
        const shipGroup = new THREE.Group();
        scene.add(shipGroup);
        const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 14), new THREE.MeshStandardMaterial({ color: 0x666666 }));
        shipGroup.add(hull);

        const turrets = [];
        const turretZ = [5, 2.5, -2.5, -5];
        turretZ.forEach(z => {
            const tPivot = new THREE.Group();
            tPivot.position.set(0, 1.2, z);
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 2), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            tPivot.add(base);
            const gPivot = new THREE.Group();
            tPivot.add(gPivot);

            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const g = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 3.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                g.rotation.x = Math.PI/2;
                g.position.set(i*0.5, 0.2, 1.7); 
                gPivot.add(g);
                barrels.push(g);
            }
            shipGroup.add(tPivot);
            turrets.push({ pivot: tPivot, guns: gPivot, barrels: barrels });
        });

        // --- OCEAN & TARGETS ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({ color: 0x004488 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -0.5;
        scene.add(ocean);

        const enemies = [];
        function spawnEnemy() {
            const eGroup = new THREE.Group();
            const eMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 12), new THREE.MeshStandardMaterial({ color: 0x992222 }));
            eGroup.add(eMesh);
            eGroup.position.set((Math.random()-0.5)*500, 0.5, (Math.random()-0.5)*500);
            scene.add(eGroup);
            enemies.push({ group: eGroup, mesh: eMesh, sinking: false, timer: 0 });
        }
        for(let i=0; i<10; i++) spawnEnemy();

        // --- LOGIC ---
        const projectiles = [];
        function fire() {
            scene.updateMatrixWorld(true);
            turrets.forEach(t => {
                t.barrels.forEach(barrel => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
                    const tipPos = new THREE.Vector3();
                    barrel.getWorldPosition(tipPos);
                    shell.position.copy(tipPos);

                    const dir = new THREE.Vector3();
                    barrel.getWorldDirection(dir);
                    // INCREASED RANGE: High velocity (4.5) and high arc
                    projectiles.push({ mesh: shell, vel: dir.multiplyScalar(4.5) });
                    scene.add(shell);
                });
            });
        }

        // --- DUAL STICK CONTROLS ---
        let moveInput = { x: 0, y: 0 };
        let aimInput = { x: 0, y: 0 };

        function setupJoystick(id, knobId, inputObj) {
            const el = document.getElementById(id);
            const knob = document.getElementById(knobId);
            const handleMove = (e) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const dx = (touch.clientX - (r.left + r.width/2)) / (r.width/2);
                const dy = (touch.clientY - (r.top + r.height/2)) / (r.height/2);
                inputObj.x = Math.max(-1, Math.min(1, dx));
                inputObj.y = Math.max(-1, Math.min(1, dy));
                knob.style.left = (50 + inputObj.x * 40) + '%';
                knob.style.top = (50 + inputObj.y * 40) + '%';
            };
            const handleEnd = () => {
                inputObj.x = 0; inputObj.y = 0;
                knob.style.left = '50%'; knob.style.top = '50%';
            };
            el.addEventListener('touchstart', handleMove);
            el.addEventListener('touchmove', handleMove);
            el.addEventListener('touchend', handleEnd);
            el.addEventListener('mousedown', (e) => {
                window.onmousemove = handleMove;
                window.onmouseup = () => { window.onmousemove = null; handleEnd(); };
            });
        }

        setupJoystick('stick-move', 'knob-move', moveInput);
        setupJoystick('stick-aim', 'knob-aim', aimInput);

        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
        document.getElementById('fire-btn').addEventListener('mousedown', fire);

        // --- MAIN LOOP ---
        let score = 0; let speed = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Ship movement (Left Stick)
            speed = THREE.MathUtils.lerp(speed, -moveInput.y * 0.6, 0.02);
            shipGroup.rotation.y -= moveInput.x * 0.02 * (Math.abs(speed)/0.6);
            shipGroup.translateZ(speed);

            // Turret Control (Right Stick)
            turrets.forEach(t => {
                // Aim turrets based on Right Stick X
                t.pivot.rotation.y = THREE.MathUtils.lerp(t.pivot.rotation.y, -aimInput.x * Math.PI, 0.1);
                // Elevate guns based on Right Stick Y
                t.guns.rotation.x = THREE.MathUtils.lerp(t.guns.rotation.x, aimInput.y * 0.8 - 0.2, 0.1);
            });

            // Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.03; // GRAVITY

                if (p.mesh.position.y < -1) {
                    scene.remove(p.mesh); projectiles.splice(i, 1); continue;
                }

                enemies.forEach(en => {
                    if (!en.sinking && p.mesh.position.distanceTo(en.group.position) < 8) {
                        en.sinking = true; en.mesh.material.color.set(0xff0000);
                        scene.remove(p.mesh); projectiles.splice(i, 1);
                        score++; document.getElementById('score').innerText = "Targets Sunk: " + score;
                    }
                });
            }

            // Sinking targets
            enemies.forEach((en, idx) => {
                if (en.sinking) {
                    en.group.position.y -= 0.05; en.group.rotation.z += 0.02; en.timer++;
                    if (en.timer > 80) { scene.remove(en.group); enemies.splice(idx, 1); spawnEnemy(); }
                }
            });

            const camPos = new THREE.Vector3(0, 18, -40).applyMatrix4(shipGroup.matrixWorld);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(shipGroup.position);

            document.getElementById('speed').innerText = Math.abs(Math.floor(speed * 100)) + " KNOTS";
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
