<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>USS Montana: Full Broadside</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #speed { font-size: 18px; font-weight: bold; color: #00ffcc; }
        .ctrl { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid white; }
        #touch-zone { bottom: 30px; left: 30px; width: 100px; height: 100px; }
        #knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: white; border-radius: 50%; }
        #fire-btn { bottom: 40px; right: 40px; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: rgba(255,0,0,0.6); pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div>USS MONTANA (BB-67)</div>
        <div id="speed">0 KNOTS</div>
        <div id="score">Targets Neutralized: 0</div>
    </div>
    
    <div id="touch-zone" class="ctrl"><div id="knob"></div></div>
    <div id="fire-btn" class="ctrl">FIRE SALVO</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE & LIGHTING ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 100, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

        // --- SHIP STRUCTURE ---
        const shipGroup = new THREE.Group();
        scene.add(shipGroup);

        const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 14), new THREE.MeshStandardMaterial({ color: 0x666666 }));
        shipGroup.add(hull);

        const turrets = [];
        const turretZ = [5, 2.5, -2.5, -5];
        turretZ.forEach(z => {
            const turretPivot = new THREE.Group(); // Handles Left/Right
            turretPivot.position.set(0, 1.2, z);
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 2), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            turretPivot.add(base);

            const gunPivot = new THREE.Group(); // Handles Up/Down
            gunPivot.position.set(0, 0.2, 0.5);
            turretPivot.add(gunPivot);

            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const g = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 3.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                g.rotation.x = Math.PI/2;
                g.position.set(i*0.5, 0, 1.5);
                gunPivot.add(g);
                barrels.push(g);
            }

            shipGroup.add(turretPivot);
            turrets.push({ pivot: turretPivot, guns: gunPivot, barrels: barrels });
        });

        // --- OCEAN & ENEMIES ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({ color: 0x004488 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -0.5;
        scene.add(ocean);

        const enemies = [];
        function spawnEnemy() {
            const eGroup = new THREE.Group();
            const eMesh = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 12), new THREE.MeshStandardMaterial({ color: 0x992222 }));
            eGroup.add(eMesh);
            eGroup.position.set((Math.random()-0.5)*300, 0.5, (Math.random()-0.5)*300);
            scene.add(eGroup);
            enemies.push({ group: eGroup, mesh: eMesh, sinking: false, timer: 0 });
        }
        for(let i=0; i<8; i++) spawnEnemy();

        // --- PROJECTILE & EXPLOSION ---
        const projectiles = [];
        function fire() {
            turrets.forEach(t => {
                t.barrels.forEach(barrel => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
                    const worldPos = new THREE.Vector3();
                    barrel.getWorldPosition(worldPos);
                    shell.position.copy(worldPos);

                    const vel = new THREE.Vector3(0, 0, 2); // Velocity
                    const worldQuat = new THREE.Quaternion();
                    barrel.getWorldQuaternion(worldQuat);
                    vel.applyQuaternion(worldQuat);

                    projectiles.push({ mesh: shell, vel: vel });
                    scene.add(shell);
                });
            });
        }

        // --- INPUTS ---
        let input = { fwd: 0, turn: 0 };
        const keys = {};
        window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key === ' ') fire(); };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        document.getElementById('fire-btn').addEventListener('pointerdown', fire);

        const zone = document.getElementById('touch-zone');
        zone.ontouchmove = (e) => {
            const r = zone.getBoundingClientRect();
            input.turn = (e.touches[0].clientX - (r.left + r.width/2)) / (r.width/2);
            input.fwd = ((r.top + r.height/2) - e.touches[0].clientY) / (r.height/2);
        };
        zone.ontouchend = () => input = { fwd: 0, turn: 0 };

        // --- MAIN LOOP ---
        let score = 0; let speed = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Ship Movement
            const move = keys['w'] ? 1 : (keys['s'] ? -1 : input.fwd);
            const rot = keys['a'] ? -1 : (keys['d'] ? 1 : input.turn);
            speed = THREE.MathUtils.lerp(speed, move * 0.4, 0.02);
            shipGroup.rotation.y -= rot * 0.015 * (Math.abs(speed)/0.4);
            shipGroup.position.x += Math.sin(shipGroup.rotation.y) * speed;
            shipGroup.position.z += Math.cos(shipGroup.rotation.y) * speed;

            // Turret & Gun Movement (Aiming at Horizon)
            turrets.forEach(t => {
                t.pivot.rotation.y = Math.sin(Date.now() * 0.001) * 0.5; // Auto-sweep L/R
                t.guns.rotation.x = -0.1 - Math.abs(Math.sin(Date.now() * 0.0005) * 0.3); // Auto-elevate
            });

            // Shell Physics
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.015; // Gravity

                if (p.mesh.position.y < -0.5) {
                    scene.remove(p.mesh); projectiles.splice(i, 1); continue;
                }

                enemies.forEach(en => {
                    if (!en.sinking && p.mesh.position.distanceTo(en.group.position) < 5) {
                        en.sinking = true;
                        en.mesh.material.color.set(0xff0000); // Explosion flash
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = "Targets Neutralized: " + score;
                    }
                });
            }

            // Enemy Sinking Logic
            enemies.forEach((en, idx) => {
                if (en.sinking) {
                    en.group.position.y -= 0.02;
                    en.group.rotation.z += 0.01;
                    en.timer++;
                    if (en.timer > 100) {
                        scene.remove(en.group);
                        enemies.splice(idx, 1);
                        spawnEnemy();
                    }
                }
            });

            // Camera follow
            const camPos = new THREE.Vector3(0, 12, -28).applyMatrix4(shipGroup.matrixWorld);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(shipGroup.position);

            document.getElementById('speed').innerText = Math.abs(Math.floor(speed * 100)) + " KNOTS";
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
