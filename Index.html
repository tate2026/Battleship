<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Heavy Ordnance</title>
    <style>
        body { margin: 0; overflow: hidden; background: #64b5f6; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2); z-index: 200; touch-action: none; backdrop-filter: blur(8px); }
        .knob { position: absolute; width: 44px; height: 44px; background: radial-gradient(#fff, #ccc); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #stick-move { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        #stick-aim { bottom: 40px; right: 40px; width: 120px; height: 120px; }
        #fire-btn { 
            position: absolute; bottom: 180px; left: 50px; width: 100px; height: 100px; 
            border-radius: 50%; background: radial-gradient(#ff5f6d, #ffc371); border: 4px solid #fff;
            color: white; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 26px; font-weight: 900; color: #ffd700; letter-spacing: 1px;">USS MONTANA (BB-67)</div>
        <div id="speed" style="font-weight: 600; opacity: 0.9;">POWER: IDLE</div>
        <div id="score" style="font-weight: 600; color: #ff4b2b;">ENEMIES NEUTRALIZED: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x81d4fa);
        scene.fog = new THREE.Fog(0x81d4fa, 2000, 7500); 
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 25000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(200, 400, 100);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

        function createShipMesh(w, h, l, color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            const hullPoints = [
                new THREE.Vector2(0, l/2), new THREE.Vector2(w/2, l/4),
                new THREE.Vector2(w/2, -l/4), new THREE.Vector2(w/4, -l/2),
                new THREE.Vector2(-w/4, -l/2), new THREE.Vector2(-w/2, -l/4),
                new THREE.Vector2(-w/2, l/4), new THREE.Vector2(0, l/2)
            ];
            const shape = new THREE.Shape(hullPoints);
            const hullGeo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: true, bevelSize: 0.5 });
            const hullMesh = new THREE.Mesh(hullGeo, mat);
            hullMesh.rotation.x = Math.PI/2; 
            hullMesh.position.y = h/2;
            group.add(hullMesh);
            return { group, mat };
        }

        // --- PLAYER SHIP: 120 UNITS ---
        const { group: ship } = createShipMesh(13, 5, 120, 0x455a64);
        scene.add(ship);
        
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(7, 8, 20), new THREE.MeshStandardMaterial({color: 0x37474f}));
        bridge.position.set(0, 8, -5);
        ship.add(bridge);

        const turrets = [];
        [40, 25, -25, -40].forEach(z => {
            const tPivot = new THREE.Group();
            tPivot.position.set(0, 5.5, z);
            const box = new THREE.Mesh(new THREE.BoxGeometry(8, 2.5, 10), new THREE.MeshStandardMaterial({color: 0x263238}));
            tPivot.add(box);
            const gPivot = new THREE.Group();
            tPivot.add(gPivot);
            const barrels = [];
            for(let i = -1; i <= 1; i++) {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 20), new THREE.MeshStandardMaterial({color: 0x111111}));
                b.rotation.x = Math.PI/2;
                b.position.set(i * 2.2, 0.8, 10);
                gPivot.add(b);
                barrels.push(b);
            }
            ship.add(tPivot);
            turrets.push({ pivot: tPivot, guns: gPivot, barrels: barrels });
        });

        // --- PARTICLE ENGINE ---
        const particles = [];
        function spawnFX(pos, color, scale, vel, decay = 0.02, grow = 1.0) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(scale), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 }));
            p.position.copy(pos);
            scene.add(p);
            particles.push({ mesh: p, vel: vel, life: 1.0, decay: decay, grow: grow });
        }

        // --- ENEMIES ---
        function createEnemy() {
            const { group: eGroup } = createShipMesh(14, 6, 45, 0x212121);
            const waterline = new THREE.Mesh(new THREE.BoxGeometry(14.5, 1.2, 45.5), new THREE.MeshBasicMaterial({color: 0x8b0000}));
            waterline.position.y = 0.6;
            eGroup.add(waterline);
            eGroup.position.set((Math.random()-0.5)*5000, 0, (Math.random()-0.5)*5000);
            scene.add(eGroup);
            return { group: eGroup, sinking: false, timer: 0 };
        }
        const enemies = [];
        for(let i=0; i<15; i++) enemies.push(createEnemy());

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshStandardMaterial({ color: 0x0277bd }));
        ocean.rotation.x = -Math.PI / 2;
        scene.add(ocean);

        // --- FIRE SYSTEM ---
        const projectiles = [];
        function fire() {
            turrets.forEach(t => {
                t.barrels.forEach(barrel => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(1.6), new THREE.MeshBasicMaterial({ color: 0xffea00 }));
                    barrel.updateMatrixWorld(true);
                    const pos = new THREE.Vector3(); barrel.getWorldPosition(pos);
                    shell.position.copy(pos);
                    const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(barrel.getWorldQuaternion(new THREE.Quaternion()));
                    projectiles.push({ mesh: shell, vel: dir.multiplyScalar(8.0), gravity: 0.022 });
                    scene.add(shell);
                    
                    // SLIGHTLY LARGER MUZZLE EFFECTS
                    // Initial flash is larger and grows fast
                    spawnFX(pos, 0xffcc33, 2.5, new THREE.Vector3(0, 0.15, 0), 0.12, 1.3); 
                    // Smoke is bigger and lingers a bit more
                    spawnFX(pos, 0x666666, 1.8, new THREE.Vector3(0, 0.08, 0), 0.04, 1.15); 
                });
            });
        }

        // --- CONTROLS ---
        let moveIn = { x: 0, y: 0 }, aimIn = { x: 0, y: 0 };
        function bindStick(id, knId, input) {
            const el = document.getElementById(id), kn = document.getElementById(knId);
            const move = (e) => {
                e.preventDefault(); const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                input.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                input.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1, Math.min(1, input.x)) * 40) + '%';
                kn.style.top = (50 + Math.max(-1, Math.min(1, input.y)) * 40) + '%';
            };
            const reset = () => { input.x = 0; input.y = 0; kn.style.left='50%'; kn.style.top='50%'; };
            el.addEventListener('pointerdown', move);
            el.addEventListener('pointermove', (e) => { if(e.buttons) move(e); });
            el.addEventListener('pointerup', reset);
        }
        bindStick('stick-move', 'knob-move', moveIn);
        bindStick('stick-aim', 'knob-aim', aimIn);
        document.getElementById('fire-btn').addEventListener('pointerdown', fire);

        let score = 0, spd = 0;
        function animate() {
            requestAnimationFrame(animate);

            spd = THREE.MathUtils.lerp(spd, -moveIn.y * 2.2, 0.006);
            ship.rotation.y -= moveIn.x * 0.003 * (Math.abs(spd)+0.1);
            ship.translateZ(spd);

            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; 
                p.mesh.position.add(p.vel); 
                p.life -= p.decay;
                p.mesh.scale.multiplyScalar(p.grow);
                p.mesh.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
            }

            turrets.forEach(t => {
                t.pivot.rotation.y = THREE.MathUtils.lerp(t.pivot.rotation.y, -aimIn.x * Math.PI, 0.04);
                t.guns.rotation.x = THREE.MathUtils.lerp(t.guns.rotation.x, aimIn.y * 0.7 - 0.2, 0.04);
            });

            for(let i=projectiles.length-1; i>=0; i--) {
                const p = projectiles[i]; p.mesh.position.add(p.vel); p.vel.y -= p.gravity;
                if(p.mesh.position.y < 0) {
                    spawnFX(p.mesh.position, 0xffffff, 4, new THREE.Vector3(0,0.4,0), 0.05); 
                    scene.remove(p.mesh); projectiles.splice(i,1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.mesh.position.distanceTo(en.group.position) < 40) {
                            en.sinking = true; score++;
                            document.getElementById('score').innerText = `ENEMIES NEUTRALIZED: ${score}`;
                            scene.remove(p.mesh); projectiles.splice(i,1);
                            for(let j=0; j<8; j++) {
                                spawnFX(en.group.position, 0xff4500, 5, new THREE.Vector3((Math.random()-0.5)*3, 1.5, (Math.random()-0.5)*3), 0.02, 1.06);
                            }
                        }
                    });
                }
            }

            enemies.forEach((en, idx) => {
                if(en.sinking) {
                    en.group.position.y -= 0.08; en.group.rotation.x += 0.003; en.timer++;
                    if(Math.random() > 0.8) {
                        spawnFX(en.group.position, 0xff2200, 2.5, new THREE.Vector3(0, 1.2, 0), 0.03, 1.1);
                    }
                    if(en.timer > 250) { scene.remove(en.group); enemies.splice(idx,1); enemies.push(createEnemy()); }
                }
            });

            const camPos = new THREE.Vector3(0, 180, -350).applyMatrix4(ship.matrixWorld);
            camera.position.lerp(camPos, 0.03);
            camera.lookAt(ship.position);

            document.getElementById('speed').innerText = `POWER: ${Math.abs(Math.floor(spd*20))} KNOTS`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
