<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Montana Naval Strike PWA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        
        /* Joystick Styles */
        #touch-zone {
            position: absolute; bottom: 40px; left: 40px; 
            width: 150px; height: 150px; 
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; margin: -25px;
            background: rgba(255,255,255,0.4); border-radius: 50%;
            transition: transform 0.1s ease-out;
        }
        #fire-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255, 0, 0, 0.4); border: 2px solid white;
            color: white; font-weight: bold; display: flex;
            align-items: center; justify-content: center; pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>USS MONTANA (BB-67)</h2>
        <div id="speed-display">Speed: 0 knots</div>
    </div>

    <div id="touch-zone">
        <div id="joystick-knob"></div>
    </div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
