<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Naval Trials</title>
    <style>
        body { margin: 0; overflow: hidden; background: #01579b; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); z-index: 200; backdrop-filter: blur(5px); }
        .knob { position: absolute; width: 44px; height: 44px; background: radial-gradient(#eee, #999); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #stick-move { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        #stick-aim { bottom: 40px; right: 40px; width: 120px; height: 120px; }
        #fire-btn { 
            position: absolute; bottom: 180px; left: 50px; width: 100px; height: 100px; 
            border-radius: 50%; background: radial-gradient(#ff1744, #b71c1c); border: 4px solid #fff;
            color: white; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px; font-weight: 900; color: #ffd700; letter-spacing: 1px;">USS MONTANA BB-67</div>
        <div id="speed">KNOTS: 0</div>
        <div id="score">TARGETS SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x81d4fa);
        scene.fog = new THREE.Fog(0x81d4fa, 2000, 12000); 
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 40000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(500, 1000, 500);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

        function createDetailedShip(w, h, l, hullColor, deckColor) {
            const group = new THREE.Group();
            const shape = new THREE.Shape();
            shape.moveTo(0, l/2);
            shape.bezierCurveTo(w/2, l/3, w/2, -l/3, w/4, -l/2);
            shape.lineTo(-w/4, -l/2);
            shape.bezierCurveTo(-w/2, -l/3, -w/2, l/3, 0, l/2);
            const hullGeo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: true, bevelSize: 0.5 });
            const hull = new THREE.Mesh(hullGeo, new THREE.MeshStandardMaterial({ color: hullColor }));
            hull.rotation.x = Math.PI/2;
            hull.position.y = h/2;
            group.add(hull);
            const deck = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.85, l * 0.95), new THREE.MeshStandardMaterial({ color: deckColor }));
            deck.rotation.x = -Math.PI/2;
            deck.position.y = h + 0.1;
            group.add(deck);
            const bridge = new THREE.Mesh(new THREE.BoxGeometry(w*0.5, h, l*0.15), new THREE.MeshStandardMaterial({color: 0x78909c}));
            bridge.position.y = h + h/2;
            group.add(bridge);
            return group;
        }

        const ship = createDetailedShip(14, 6, 130, 0x455a64, 0x8d6e63);
        scene.add(ship);

        const turrets = [];
        [-45, -25, 20, 40].forEach(z => {
            const t = new THREE.Group();
            t.position.set(0, 7.5, z);
            const body = new THREE.Mesh(new THREE.BoxGeometry(8, 3, 10), new THREE.MeshStandardMaterial({color: 0x263238}));
            t.add(body);
            const gPivot = new THREE.Group();
            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 22), new THREE.MeshStandardMaterial({color: 0x111111}));
                b.rotation.x = Math.PI/2;
                b.position.set(i * 2.2, 0, 10);
                gPivot.add(b);
                barrels.push(b);
            }
            t.add(gPivot);
            ship.add(t);
            turrets.push({ pivot: t, guns: gPivot, barrels: barrels });
        });

        // --- CALM FLAT SEA ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(80000, 80000), new THREE.MeshStandardMaterial({ color: 0x01579b, roughness: 0.1 }));
        ocean.rotation.x = -Math.PI / 2;
        scene.add(ocean);

        // --- ISLANDS ---
        for(let i=0; i<25; i++) {
            const size = 150 + Math.random() * 400;
            const island = new THREE.Mesh(new THREE.ConeGeometry(size, 60, 8), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
            const x = (Math.random()-0.5)*18000, z = (Math.random()-0.5)*18000;
            island.position.set(x, -5, z);
            scene.add(island);
            const beach = new THREE.Mesh(new THREE.CircleGeometry(size + 30, 16), new THREE.MeshStandardMaterial({color: 0xffecb3}));
            beach.rotation.x = -Math.PI/2; beach.position.set(x, 0.1, z);
            scene.add(beach);
        }

        const particles = [], projectiles = [];
        function spawnFX(pos, color, size, vel, decay=0.03, grow=1.0) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.6}));
            p.position.copy(pos);
            scene.add(p);
            particles.push({m:p, v:vel, life:1.0, d:decay, g:grow});
        }

        function fire() {
            turrets.forEach(t => t.barrels.forEach(b => {
                const shell = new THREE.Mesh(new THREE.SphereGeometry(1.6), new THREE.MeshBasicMaterial({color: 0xffd600}));
                const pos = new THREE.Vector3(); b.getWorldPosition(pos);
                const dir = new THREE.Vector3(0,1,0).applyQuaternion(b.getWorldQuaternion(new THREE.Quaternion()));
                shell.position.copy(pos);
                projectiles.push({m:shell, v:dir.multiplyScalar(12), g:0.02});
                scene.add(shell);
                spawnFX(pos, 0xff9100, 2.8, new THREE.Vector3(0,0.2,0), 0.1, 1.3);
                spawnFX(pos, 0x444444, 2, new THREE.Vector3(0,0.1,0), 0.04, 1.2);
            }));
        }

        const enemies = Array(15).fill(0).map(() => {
            const e = createDetailedShip(12, 5, 60, 0x37474f, 0x5d4037);
            e.position.set((Math.random()-0.5)*10000, 0, (Math.random()-0.5)*10000);
            scene.add(e);
            return { mesh: e, sinking: false, timer: 0 };
        });

        let mv = {x:0, y:0}, am = {x:0, y:0};
        const bind = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const fn = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', fn);
            el.addEventListener('pointermove', e => e.buttons && fn(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bind('stick-move', mv); bind('stick-aim', am);
        document.getElementById('fire-btn').addEventListener('pointerdown', fire);

        let speed = 0, score = 0;
        const MAX_SPEED = 1.6; // ~32 Knots in engine units
        const ACCEL = 0.0025;  // Half acceleration for a heavy feel

        function update() {
            requestAnimationFrame(update);
            
            // PHYSICS: Limited acceleration and top speed
            let targetSpeed = -mv.y * MAX_SPEED;
            speed = THREE.MathUtils.lerp(speed, targetSpeed, ACCEL);
            
            ship.rotation.y -= mv.x * 0.003 * (Math.abs(speed/MAX_SPEED) + 0.1);
            ship.translateZ(speed);

            // WATER TRAILS (Wake)
            if (Math.abs(speed) > 0.1) {
                const wakePos = new THREE.Vector3(0, 0.1, -60).applyMatrix4(ship.matrixWorld);
                spawnFX(wakePos, 0xffffff, 1.5, new THREE.Vector3(0,0,0), 0.015, 1.02);
            }

            particles.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d;
                p.m.scale.multiplyScalar(p.g); p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
            });

            projectiles.forEach((p, i) => {
                p.m.position.add(p.v); p.v.y -= p.g;
                if(p.m.position.y < 0) {
                    spawnFX(p.m.position, 0xffffff, 4, new THREE.Vector3(0,0.5,0), 0.05);
                    scene.remove(p.m); projectiles.splice(i,1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.m.position.distanceTo(en.mesh.position) < 50) {
                            en.sinking = true; score++;
                            document.getElementById('score').innerText = `TARGETS SUNK: ${score}`;
                            scene.remove(p.m); projectiles.splice(i,1);
                            for(let j=0; j<12; j++) spawnFX(en.mesh.position, 0xff3d00, 6, new THREE.Vector3((Math.random()-0.5)*5, 2.5, (Math.random()-0.5)*5), 0.015, 1.05);
                        }
                    });
                }
            });

            turrets.forEach(t => {
                t.pivot.rotation.y = THREE.MathUtils.lerp(t.pivot.rotation.y, -am.x * Math.PI, 0.04);
                t.guns.rotation.x = THREE.MathUtils.lerp(t.guns.rotation.x, am.y * 0.6 - 0.1, 0.04);
            });

            const camGoal = new THREE.Vector3(0, 220, -450).applyMatrix4(ship.matrixWorld);
            camera.position.lerp(camGoal, 0.04);
            camera.lookAt(ship.position);

            enemies.forEach((en, idx) => {
                if(en.sinking) {
                    en.mesh.position.y -= 0.1; en.mesh.rotation.z += 0.002; en.timer++;
                    if(en.timer > 300) { scene.remove(en.mesh); enemies.splice(idx,1); enemies.push(createEnemy()); }
                }
            });

            document.getElementById('speed').innerText = `KNOTS: ${Math.abs(Math.floor((speed / MAX_SPEED) * 32))}`;
            renderer.render(scene, camera);
        }
        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
