<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Enhanced Handling</title>
    <style>
        body { margin: 0; overflow: hidden; background: #01579b; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); z-index: 200; backdrop-filter: blur(5px); }
        .knob { position: absolute; width: 44px; height: 44px; background: radial-gradient(#eee, #999); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #stick-move { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        #stick-aim { bottom: 40px; right: 40px; width: 120px; height: 120px; }
        #fire-btn { 
            position: absolute; bottom: 180px; left: 50px; width: 100px; height: 100px; 
            border-radius: 50%; background: #b71c1c; border: 4px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px; font-weight: 900; color: #ffd700; letter-spacing: 1px;">USS MONTANA (BB-67)</div>
        <div id="speed">KNOTS: 0</div>
        <div id="score">TARGETS SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x81d4fa);
        scene.fog = new THREE.Fog(0x81d4fa, 3000, 25000); 
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(1000, 2000, 1000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.8));

        function createSectionedShip(maxW, h, totalL, hullCol, deckCol, isPlayer = false) {
            const group = new THREE.Group();
            const sections = [
                { z: totalL/2,  w: 0.1 },   
                { z: totalL/4,  w: maxW },  
                { z: 0,         w: maxW },  
                { z: -totalL/4, w: maxW * 0.85 }, 
                { z: -totalL/2, w: maxW * 0.4 }  
            ];

            const hullShape = new THREE.Shape();
            hullShape.moveTo(0, sections[0].z);
            sections.forEach(s => hullShape.lineTo(s.w/2, s.z));
            sections.slice().reverse().forEach(s => hullShape.lineTo(-s.w/2, s.z));
            hullShape.lineTo(0, sections[0].z);

            const hullGeom = new THREE.ExtrudeGeometry(hullShape, { depth: h, bevelEnabled: true, bevelSize: 1.5 });
            const hull = new THREE.Mesh(hullGeom, new THREE.MeshStandardMaterial({ color: hullCol }));
            hull.rotation.x = Math.PI/2;
            hull.position.y = h/2;
            group.add(hull);

            const deckShape = new THREE.Shape();
            const inset = 0.5; 
            deckShape.moveTo(0, sections[0].z - inset);
            sections.forEach(s => deckShape.lineTo((s.w/2) - inset, s.z));
            sections.slice().reverse().forEach(s => deckShape.lineTo(-(s.w/2) + inset, s.z));
            deckShape.lineTo(0, sections[0].z - inset);

            const deckGeom = new THREE.ShapeGeometry(deckShape);
            const deck = new THREE.Mesh(deckGeom, new THREE.MeshStandardMaterial({ color: deckCol }));
            deck.rotation.x = -Math.PI/2;
            deck.position.y = h + 0.15; 
            group.add(deck);

            if(isPlayer) {
                const tower = new THREE.Mesh(new THREE.BoxGeometry(maxW*0.3, h*2, 30), new THREE.MeshStandardMaterial({color: 0x78909c}));
                tower.position.set(0, h+h, 0);
                group.add(tower);
                for(let z of [-25, 15]) {
                    const stack = new THREE.Mesh(new THREE.CylinderGeometry(maxW*0.1, maxW*0.12, 18), new THREE.MeshStandardMaterial({color: 0x222222}));
                    stack.position.set(0, h+10, z);
                    group.add(stack);
                }
            } else {
                const mast = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 50), new THREE.MeshBasicMaterial({color: 0xff3300}));
                mast.position.y = h + 25;
                group.add(mast);
            }
            return group;
        }

        const ship = createSectionedShip(28, 8, 260, 0x455a64, 0x8d6e63, true);
        scene.add(ship);

        const turrets = [];
        [-100, -70, 60, 90].forEach(z => {
            const t = new THREE.Group();
            t.position.set(0, 9.7, z);
            t.add(new THREE.Mesh(new THREE.BoxGeometry(8, 3, 10), new THREE.MeshStandardMaterial({color: 0x263238})));
            const pivot = new THREE.Group();
            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 22), new THREE.MeshStandardMaterial({color: 0x111111}));
                b.rotation.x = Math.PI/2; b.position.set(i * 2.2, 0, 10);
                pivot.add(b); barrels.push(b);
            }
            t.add(pivot); ship.add(t);
            turrets.push({ group: t, pivot: pivot, barrels: barrels });
        });

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(120000, 120000), new THREE.MeshStandardMaterial({ color: 0x01579b, roughness: 0.2 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -0.1;
        scene.add(ocean);

        const particles = [], projectiles = [];
        function spawnFX(pos, color, size, vel, decay=0.03, grow=1.0, opacity=0.6) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color, transparent:true, opacity}));
            p.position.copy(pos);
            scene.add(p);
            particles.push({m:p, v:vel, life:1.0, d:decay, g:grow});
        }

        function fire() {
            turrets.forEach(t => t.barrels.forEach(b => {
                const shell = new THREE.Mesh(new THREE.SphereGeometry(1.8), new THREE.MeshBasicMaterial({color: 0xffd600}));
                const pos = new THREE.Vector3(); b.getWorldPosition(pos);
                const dir = new THREE.Vector3(0,1,0).applyQuaternion(b.getWorldQuaternion(new THREE.Quaternion()));
                shell.position.copy(pos);
                projectiles.push({m:shell, v:dir.multiplyScalar(18), g:0.02});
                scene.add(shell);
                spawnFX(pos, 0xff9100, 2, new THREE.Vector3(0,0.1,0), 0.15, 1.2);
            }));
        }

        const enemies = Array(12).fill(0).map(() => {
            const e = createSectionedShip(14, 6, 80, 0x37474f, 0x5d4037, false);
            const dist = 2000 + Math.random() * 4500;
            const ang = Math.random() * Math.PI * 2;
            e.position.set(Math.cos(ang)*dist, 0, Math.sin(ang)*dist);
            scene.add(e);
            return { mesh: e, sinking: false, timer: 0 };
        });

        let mv = {x:0, y:0}, am = {x:0, y:0};
        const bind = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const fn = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', fn);
            el.addEventListener('pointermove', e => e.buttons && fn(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bind('stick-move', mv); bind('stick-aim', am);
        document.getElementById('fire-btn').addEventListener('pointerdown', fire);

        let speed = 0, score = 0;
        const MAX_SPEED = 1.7;
        const ACCEL = 0.0018; // Increased by 1.2x (from 0.0015)
        const TURN_SPEED = 0.0018; // Increased by 1.2x (from 0.0015)

        function update() {
            requestAnimationFrame(update);
            speed = THREE.MathUtils.lerp(speed, -mv.y * MAX_SPEED, ACCEL);
            ship.rotation.y -= mv.x * TURN_SPEED * (Math.abs(speed/MAX_SPEED) + 0.1);
            ship.translateZ(speed);

            if (Math.abs(speed) > 0.1) {
                const sternPos = new THREE.Vector3(0, 0.1, -130).applyMatrix4(ship.matrixWorld);
                for(let i = -1; i <= 1; i += 2) {
                    const driftVec = new THREE.Vector3(i * 0.1, 0, -0.05).applyQuaternion(ship.quaternion);
                    spawnFX(sternPos, 0xffffff, 0.7, driftVec, 0.03, 1.03, 0.3);
                }
            }

            particles.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d;
                p.m.scale.multiplyScalar(p.g); p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
            });

            projectiles.forEach((p, i) => {
                p.m.position.add(p.v); p.v.y -= p.g;
                if(p.m.position.y < 0) {
                    spawnFX(p.m.position, 0xffffff, 5, new THREE.Vector3(0,0.5,0), 0.05);
                    scene.remove(p.m); projectiles.splice(i,1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.m.position.distanceTo(en.mesh.position) < 80) {
                            en.sinking = true; score++;
                            document.getElementById('score').innerText = `TARGETS SUNK: ${score}`;
                            scene.remove(p.m); projectiles.splice(i,1);
                            for(let j=0; j<12; j++) spawnFX(en.mesh.position, 0xff4500, 10, new THREE.Vector3((Math.random()-0.5)*8, 4, (Math.random()-0.5)*8), 0.012);
                        }
                    });
                }
            });

            turrets.forEach(t => {
                t.group.rotation.y = THREE.MathUtils.lerp(t.group.rotation.y, -am.x * Math.PI, 0.04);
                t.pivot.rotation.x = THREE.MathUtils.lerp(t.pivot.rotation.x, am.y * 0.6 - 0.1, 0.04);
            });

            // CAMERA DELAY / SLOW VIEW LOGIC
            // Using a lower lerp value (0.015 instead of 0.04) makes the camera lag behind the turn
            const camOffset = new THREE.Vector3(0, 480, -900).applyMatrix4(ship.matrixWorld);
            camera.position.lerp(camOffset, 0.015); 
            camera.lookAt(ship.position);

            enemies.forEach((en, idx) => {
                if(en.sinking) {
                    en.mesh.position.y -= 0.15; en.mesh.rotation.z += 0.002; en.timer++;
                    if(en.timer > 300) { scene.remove(en.mesh); enemies.splice(idx,1); }
                }
            });

            document.getElementById('speed').innerText = `KNOTS: ${Math.abs(Math.floor((speed / MAX_SPEED) * 32))}`;
            renderer.render(scene, camera);
        }
        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
