<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Montana Strike: Debugged</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 100; }
        
        .ctrl-base { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); z-index: 200; touch-action: none; }
        .knob { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); top: 50%; left: 50%; }
        
        #stick-move { bottom: 30px; left: 30px; width: 100px; height: 100px; }
        #stick-aim { bottom: 30px; right: 30px; width: 100px; height: 100px; }
        
        #fire-btn { 
            position: absolute; bottom: 150px; right: 30px; width: 100px; height: 100px; 
            border-radius: 50%; background: #ff4444; border: 4px solid white;
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 18px; font-weight: bold;">USS MONTANA (BB-67)</div>
        <div id="speed">0 KNOTS</div>
        <div id="score">Targets Sunk: 0</div>
    </div>
    
    <div id="stick-move" class="ctrl-base"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="ctrl-base"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

        // --- SHIP ---
        const shipGroup = new THREE.Group();
        scene.add(shipGroup);
        const hull = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 14), new THREE.MeshStandardMaterial({ color: 0x5a5a5a }));
        shipGroup.add(hull);

        const turrets = [];
        const turretZ = [5, 2.5, -2.5, -5];
        turretZ.forEach(z => {
            const tPivot = new THREE.Group();
            tPivot.position.set(0, 1.2, z);
            const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.7, 2), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            tPivot.add(base);
            const gPivot = new THREE.Group();
            tPivot.add(gPivot);

            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const g = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                g.rotation.x = Math.PI/2;
                g.position.set(i*0.5, 0.2, 1.8); 
                gPivot.add(g);
                barrels.push(g);
            }
            shipGroup.add(tPivot);
            turrets.push({ pivot: tPivot, guns: gPivot, barrels: barrels });
        });

        // --- OCEAN ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({ color: 0x003366 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -0.5;
        scene.add(ocean);

        const enemies = [];
        function spawnEnemy() {
            const eGroup = new THREE.Group();
            const eMesh = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 15), new THREE.MeshStandardMaterial({ color: 0x880000 }));
            eGroup.add(eMesh);
            eGroup.position.set((Math.random()-0.5)*600, 0, (Math.random()-0.5)*600);
            scene.add(eGroup);
            enemies.push({ group: eGroup, mesh: eMesh, sinking: false, timer: 0 });
        }
        for(let i=0; i<12; i++) spawnEnemy();

        // --- PROJECTILE LOGIC (DEBUGGED) ---
        const projectiles = [];
        function fire() {
            // Force visual update before calculating world positions
            renderer.render(scene, camera); 
            scene.updateMatrixWorld(true);

            turrets.forEach(t => {
                t.barrels.forEach(barrel => {
                    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0xffdd00 }));
                    
                    const worldPos = new THREE.Vector3();
                    barrel.getWorldPosition(worldPos);
                    shell.position.copy(worldPos);

                    // Robust Direction Calculation
                    const worldQuat = new THREE.Quaternion();
                    barrel.getWorldQuaternion(worldQuat);
                    const forceDir = new THREE.Vector3(0, 0, 1).applyQuaternion(worldQuat);

                    projectiles.push({ 
                        mesh: shell, 
                        vel: forceDir.multiplyScalar(5.5) // High speed
                    });
                    scene.add(shell);
                });
            });
        }

        // --- INPUTS ---
        let moveIn = { x: 0, y: 0 };
        let aimIn = { x: 0, y: 0 };

        function bindStick(id, knobId, input) {
            const area = document.getElementById(id);
            const knob = document.getElementById(knobId);
            const move = (e) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const r = area.getBoundingClientRect();
                input.x = (touch.clientX - (r.left + r.width/2)) / (r.width/2);
                input.y = (touch.clientY - (r.top + r.height/2)) / (r.width/2);
                knob.style.left = (50 + Math.max(-1, Math.min(1, input.x)) * 40) + '%';
                knob.style.top = (50 + Math.max(-1, Math.min(1, input.y)) * 40) + '%';
            };
            const end = () => { input.x = 0; input.y = 0; knob.style.left = '50%'; knob.style.top = '50%'; };
            area.addEventListener('touchstart', move);
            area.addEventListener('touchmove', move);
            area.addEventListener('touchend', end);
            area.addEventListener('mousedown', () => { window.onmousemove = move; window.onmouseup = () => { window.onmousemove = null; end(); }; });
        }
        bindStick('stick-move', 'knob-move', moveIn);
        bindStick('stick-aim', 'knob-aim', aimIn);

        const fBtn = document.getElementById('fire-btn');
        fBtn.addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
        fBtn.addEventListener('mousedown', (e) => { e.preventDefault(); fire(); });

        // --- GAME LOOP ---
        let score = 0; let speed = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Driving
            speed = THREE.MathUtils.lerp(speed, -moveIn.y * 0.7, 0.03);
            shipGroup.rotation.y -= moveIn.x * 0.02 * (Math.abs(speed)/0.7);
            shipGroup.translateZ(speed);

            // Turrets
            turrets.forEach(t => {
                t.pivot.rotation.y = THREE.MathUtils.lerp(t.pivot.rotation.y, -aimIn.x * Math.PI, 0.1);
                t.guns.rotation.x = THREE.MathUtils.lerp(t.guns.rotation.x, aimIn.y * 0.8 - 0.2, 0.1);
            });

            // Projectile Physics
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.vel);
                p.vel.y -= 0.035; // Gravity

                if (p.mesh.position.y < -1) {
                    scene.remove(p.mesh); projectiles.splice(i, 1);
                } else {
                    enemies.forEach(en => {
                        if (!en.sinking && p.mesh.position.distanceTo(en.group.position) < 10) {
                            en.sinking = true; en.mesh.material.color.set(0xffaa00);
                            scene.remove(p.mesh); projectiles.splice(i, 1);
                            score++; document.getElementById('score').innerText = "Targets Sunk: " + score;
                        }
                    });
                }
            }

            // Sinking
            enemies.forEach((en, idx) => {
                if (en.sinking) {
                    en.group.position.y -= 0.08; en.group.rotation.x += 0.04; en.timer++;
                    if (en.timer > 60) { scene.remove(en.group); enemies.splice(idx, 1); spawnEnemy(); }
                }
            });

            const camPos = new THREE.Vector3(0, 20, -45).applyMatrix4(shipGroup.matrixWorld);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(shipGroup.position);

            document.getElementById('speed').innerText = Math.abs(Math.floor(speed * 100)) + " KNOTS";
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
