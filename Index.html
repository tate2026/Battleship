<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USS Montana: Super-Dreadnought</title>
    <style>
        body { margin: 0; overflow: hidden; background: #01579b; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100; }
        .stick-container { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); z-index: 200; backdrop-filter: blur(5px); }
        .knob { position: absolute; width: 44px; height: 44px; background: radial-gradient(#eee, #999); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #stick-move { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        #stick-aim { bottom: 40px; right: 40px; width: 120px; height: 120px; }
        #fire-btn { 
            position: absolute; bottom: 180px; left: 50px; width: 100px; height: 100px; 
            border-radius: 50%; background: #b71c1c; border: 4px solid #fff;
            color: white; font-weight: 900; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 300; box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px; font-weight: 900; color: #ffd700; letter-spacing: 1px;">USS MONTANA (BB-67)</div>
        <div id="speed">KNOTS: 0</div>
        <div id="score">TARGETS SUNK: 0</div>
    </div>
    
    <div id="stick-move" class="stick-container"><div id="knob-move" class="knob"></div></div>
    <div id="stick-aim" class="stick-container"><div id="knob-aim" class="knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x81d4fa);
        scene.fog = new THREE.Fog(0x81d4fa, 3000, 15000); 
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(1000, 1500, 1000);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.8));

        // --- SHIP CONSTRUCTOR (DOUBLED SIZE) ---
        function createDetailedShip(w, h, l, hullColor, deckColor, isPlayer = false) {
            const group = new THREE.Group();
            const shape = new THREE.Shape();
            shape.moveTo(0, l/2);
            shape.bezierCurveTo(w/2, l/3, w/2, -l/3, w/4, -l/2);
            shape.lineTo(-w/4, -l/2);
            shape.bezierCurveTo(-w/2, -l/3, -w/2, l/3, 0, l/2);
            
            const hull = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: true, bevelSize: 0.5 }), new THREE.MeshStandardMaterial({ color: hullColor }));
            hull.rotation.x = Math.PI/2;
            hull.position.y = h/2;
            group.add(hull);

            const deck = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.9, l * 0.98), new THREE.MeshStandardMaterial({ color: deckColor }));
            deck.rotation.x = -Math.PI/2;
            deck.position.y = h + 0.1;
            group.add(deck);

            if(isPlayer) {
                // Bridge & Funnels
                const superstructure = new THREE.Mesh(new THREE.BoxGeometry(w*0.4, h*1.5, l*0.1), new THREE.MeshStandardMaterial({color: 0x78909c}));
                superstructure.position.y = h + h*0.75;
                group.add(superstructure);

                for(let i=-1; i<=1; i+=2) {
                    const funnel = new THREE.Mesh(new THREE.CylinderGeometry(w*0.1, w*0.12, 12), new THREE.MeshStandardMaterial({color: 0x222222}));
                    funnel.position.set(0, h+8, i*20);
                    group.add(funnel);
                }
                
                // Masts
                const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 40), new THREE.MeshStandardMaterial({color: 0x333333}));
                mast.position.set(0, h+20, 10);
                group.add(mast);
            }
            return group;
        }

        const ship = createDetailedShip(28, 8, 260, 0x455a64, 0x8d6e63, true);
        scene.add(ship);

        const turrets = [];
        [-100, -70, 60, 90].forEach(z => {
            const t = new THREE.Group();
            t.position.set(0, 9.5, z);
            const body = new THREE.Mesh(new THREE.BoxGeometry(8, 3, 10), new THREE.MeshStandardMaterial({color: 0x263238}));
            t.add(body);
            const gPivot = new THREE.Group();
            const barrels = [];
            for(let i=-1; i<=1; i++) {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 22), new THREE.MeshStandardMaterial({color: 0x111111}));
                b.rotation.x = Math.PI/2;
                b.position.set(i * 2.2, 0, 10);
                gPivot.add(b);
                barrels.push(b);
            }
            t.add(gPivot);
            ship.add(t);
            turrets.push({ pivot: t, guns: gPivot, barrels: barrels });
        });

        // --- OCEAN (STABLE & NO FLASH) ---
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(100000, 100000), new THREE.MeshStandardMaterial({ color: 0x01579b, roughness: 0.1 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.y = -0.5; // Offset to prevent Z-fighting
        scene.add(ocean);

        // --- FX SYSTEM ---
        const particles = [], projectiles = [];
        function spawnFX(pos, color, size, vel, decay=0.03, grow=1.0, opacity=0.6) {
            const p = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color, transparent:true, opacity}));
            p.position.copy(pos);
            scene.add(p);
            particles.push({m:p, v:vel, life:1.0, d:decay, g:grow});
        }

        function fire() {
            turrets.forEach(t => t.barrels.forEach(b => {
                const shell = new THREE.Mesh(new THREE.SphereGeometry(1.6), new THREE.MeshBasicMaterial({color: 0xffd600}));
                const pos = new THREE.Vector3(); b.getWorldPosition(pos);
                const dir = new THREE.Vector3(0,1,0).applyQuaternion(b.getWorldQuaternion(new THREE.Quaternion()));
                shell.position.copy(pos);
                projectiles.push({m:shell, v:dir.multiplyScalar(14), g:0.02});
                scene.add(shell);
                spawnFX(pos, 0xff9100, 3, new THREE.Vector3(0,0.2,0), 0.1, 1.3);
            }));
        }

        const enemies = Array(12).fill(0).map(() => {
            const e = createDetailedShip(14, 6, 70, 0x37474f, 0x5d4037);
            e.position.set((Math.random()-0.5)*15000, 0, (Math.random()-0.5)*15000);
            scene.add(e);
            return { mesh: e, sinking: false, timer: 0 };
        });

        // --- CONTROLS ---
        let mv = {x:0, y:0}, am = {x:0, y:0};
        const bind = (id, obj) => {
            const el = document.getElementById(id), kn = el.querySelector('.knob');
            const fn = (e) => {
                const t = e.touches ? e.touches[0] : e, r = el.getBoundingClientRect();
                obj.x = (t.clientX - (r.left + r.width/2)) / (r.width/2);
                obj.y = (t.clientY - (r.top + r.height/2)) / (r.height/2);
                kn.style.left = (50 + Math.max(-1,Math.min(1,obj.x))*40)+'%';
                kn.style.top = (50 + Math.max(-1,Math.min(1,obj.y))*40)+'%';
            };
            el.addEventListener('pointerdown', fn);
            el.addEventListener('pointermove', e => e.buttons && fn(e));
            el.addEventListener('pointerup', () => { obj.x=0; obj.y=0; kn.style.left='50%'; kn.style.top='50%'; });
        };
        bind('stick-move', mv); bind('stick-aim', am);
        document.getElementById('fire-btn').addEventListener('pointerdown', fire);

        let speed = 0, score = 0;
        const MAX_SPEED = 1.6; // 32 Knots
        const ACCEL = 0.00125; // Massive battleship weight

        function update() {
            requestAnimationFrame(update);
            
            speed = THREE.MathUtils.lerp(speed, -mv.y * MAX_SPEED, ACCEL);
            ship.rotation.y -= mv.x * 0.002 * (Math.abs(speed/MAX_SPEED) + 0.05);
            ship.translateZ(speed);

            // WATER TRAILS (Wake logic: drift apart V-shape)
            if (Math.abs(speed) > 0.1) {
                const sternPos = new THREE.Vector3(0, 0, -130).applyMatrix4(ship.matrixWorld);
                for(let i = -1; i <= 1; i += 2) {
                    const drift = new THREE.Vector3(i * 0.2, 0, 0).applyQuaternion(ship.quaternion);
                    spawnFX(sternPos, 0xffffff, 2, drift, 0.015, 1.05, 0.4);
                }
            }

            particles.forEach((p, i) => {
                p.m.position.add(p.v); p.life -= p.d;
                p.m.scale.multiplyScalar(p.g); p.m.material.opacity = p.life;
                if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
            });

            projectiles.forEach((p, i) => {
                p.m.position.add(p.v); p.v.y -= p.g;
                if(p.m.position.y < 0) {
                    spawnFX(p.m.position, 0xffffff, 5, new THREE.Vector3(0,0.5,0), 0.05);
                    scene.remove(p.m); projectiles.splice(i,1);
                } else {
                    enemies.forEach(en => {
                        if(!en.sinking && p.m.position.distanceTo(en.mesh.position) < 80) {
                            en.sinking = true; score++;
                            document.getElementById('score').innerText = `TARGETS SUNK: ${score}`;
                            scene.remove(p.m); projectiles.splice(i,1);
                            for(let j=0; j<15; j++) spawnFX(en.mesh.position, 0xff4500, 8, new THREE.Vector3((Math.random()-0.5)*6, 3, (Math.random()-0.5)*6), 0.012, 1.05);
                        }
                    });
                }
            }

            turrets.forEach(t => {
                t.pivot.rotation.y = THREE.MathUtils.lerp(t.pivot.rotation.y, -am.x * Math.PI, 0.03);
                t.guns.rotation.x = THREE.MathUtils.lerp(t.guns.rotation.x, am.y * 0.6 - 0.1, 0.03);
            });

            const camGoal = new THREE.Vector3(0, 350, -600).applyMatrix4(ship.matrixWorld);
            camera.position.lerp(camGoal, 0.03);
            camera.lookAt(ship.position);

            enemies.forEach((en, idx) => {
                if(en.sinking) {
                    en.mesh.position.y -= 0.1; en.mesh.rotation.z += 0.002; en.timer++;
                    if(en.timer > 300) { scene.remove(en.mesh); enemies.splice(idx,1); }
                }
            });

            document.getElementById('speed').innerText = `KNOTS: ${Math.abs(Math.floor((speed / MAX_SPEED) * 32))}`;
            renderer.render(scene, camera);
        }
        update();
    </script>
</body>
</html>
